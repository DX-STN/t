<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PWA Test App - Logic Fix</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .canvas { width: 90vw; margin: 10px 0; background: #222; position: relative; overflow: hidden; touch-action: none; }
        #nav-container { height: 30vh; }
        #main-container { height: 50vh; background: #333; }
        
        .smooth-move { transition: transform 0.3s ease-out, left 0.3s ease-out, top 0.3s ease-out, width 0.3s ease-out, height 0.3s ease-out; }

        #main-img, #nav-img { position: absolute; top: 0; left: 0; transform-origin: 0 0; pointer-events: none; display: none; }
        .crop-box { position: absolute; border: 2px solid blue; box-sizing: border-box; z-index: 10; display: none; pointer-events: none; }
        .nav-box { position: absolute; border: 1px solid red; background: rgba(255, 0, 0, 0.2); z-index: 10; pointer-events: none; display: none; }

        /* ハンドル：判定エリアを広く設定 */
        .handle { position: absolute; background: rgba(0, 100, 255, 0.05); pointer-events: auto; }
        .h-n { top: -40px; left: 0; right: 0; height: 80px; }
        .h-s { bottom: -40px; left: 0; right: 0; height: 80px; }
        .h-e { right: -40px; top: 0; bottom: 0; width: 80px; }
        .h-w { left: -40px; top: 0; bottom: 0; width: 80px; }

        .footer { margin-top: 10px; }
        .file-btn { display: inline-block; width: 60px; height: 60px; background: white; border-radius: 50%; font-size: 30px; line-height: 60px; cursor: pointer; text-align: center; color: black; }
    </style>
</head>
<body>
    <div id="nav-container" class="canvas"><img id="nav-img"><div id="nav-box" class="nav-box"></div></div>
    <div id="main-container" class="canvas">
        <img id="main-img">
        <div id="crop-box" class="crop-box">
            <div class="handle h-n" data-edge="n"></div>
            <div class="handle h-s" data-edge="s"></div>
            <div class="handle h-e" data-edge="e"></div>
            <div class="handle h-w" data-edge="w"></div>
        </div>
    </div>
    <div class="footer"><input type="file" id="file-input" accept="image/*" hidden><label for="file-input" class="file-btn">📁</label></div>

    <script>
        const navImg = document.getElementById('nav-img'), mainImg = document.getElementById('main-img'), navBox = document.getElementById('nav-box'), cropBox = document.getElementById('crop-box');
        const mCont = document.getElementById('main-container'), nCont = document.getElementById('nav-container');

        let img = { w: 0, h: 0, isLoaded: false };
        let view = { x: 0, y: 0, scale: 1 }; 
        let crop = { x: 0, y: 0, w: 0, h: 0 }; 
        let touch = { mode: '', lastX: 0, lastY: 0, edge: '' };

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files;
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                navImg.src = mainImg.src = ev.target.result;
                mainImg.onload = () => {
                    img.w = mainImg.naturalWidth; img.h = mainImg.naturalHeight;
                    img.isLoaded = true;
                    const mRect = mCont.getBoundingClientRect();
                    view.scale = Math.min(mRect.width / img.w, mRect.height / img.h);
                    view.x = (mRect.width - img.w * view.scale) / 2;
                    view.y = (mRect.height - img.h * view.scale) / 2;
                    crop = { x: view.x, y: view.y, w: img.w * view.scale, h: img.h * view.scale };
                    mainImg.style.display = navImg.style.display = 'block';
                    cropBox.style.display = navBox.style.display = 'block';
                    update(false);
                };
            };
            reader.readAsDataURL(file);
        };

        mCont.ontouchstart = (e) => {
            if (!img.isLoaded) return;
            mainImg.classList.remove('smooth-move');
            cropBox.classList.remove('smooth-move');
            if (e.target.classList.contains('handle')) {
                touch.mode = 'edit';
                touch.edge = e.target.dataset.edge;
            } else {
                touch.mode = 'scroll';
            }
            touch.lastX = e.touches[0].pageX; touch.lastY = e.touches[0].pageY;
        };

        mCont.ontouchmove = (e) => {
            if (!img.isLoaded || !touch.mode) return;
            e.preventDefault();
            const dx = e.touches[0].pageX - touch.lastX;
            const dy = e.touches[0].pageY - touch.lastY;

            if (touch.mode === 'scroll') {
                view.x += dx; view.y += dy;
            } else if (touch.mode === 'edit') {
                const imgR = view.x + img.w * view.scale;
                const imgB = view.y + img.h * view.scale;
                if (touch.edge === 'n') { let d = Math.max(dy, view.y - crop.y); crop.y += d; crop.h -= d; }
                if (touch.edge === 's') { crop.h = Math.min(crop.h + dy, imgB - crop.y); }
                if (touch.edge === 'e') { crop.w = Math.min(crop.w + dx, imgR - crop.x); }
                if (touch.edge === 'w') { let d = Math.max(dx, view.x - crop.x); crop.x += d; crop.w -= d; }
            }
            touch.lastX = e.touches[0].pageX; touch.lastY = e.touches[0].pageY;
            update(false);
        };

        mCont.ontouchend = () => {
            mainImg.classList.add('smooth-move');
            cropBox.classList.add('smooth-move');
            if (touch.mode === 'edit') fitToCrop();
            else snapBack();
            touch.mode = '';
        };

        function snapBack() {
            const minX = crop.x + crop.w - (img.w * view.scale), maxX = crop.x;
            const minY = crop.y + crop.h - (img.h * view.scale), maxY = crop.y;
            view.x = Math.max(minX, Math.min(view.x, maxX));
            view.y = Math.max(minY, Math.min(view.y, maxY));
            update(true);
        }

        function fitToCrop() {
            const mRect = mCont.getBoundingClientRect();
            const relX = (crop.x - view.x) / view.scale, relY = (crop.y - view.y) / view.scale;
            const relW = crop.w / view.scale, relH = crop.h / view.scale;
            view.scale = Math.min(mRect.width / relW, mRect.height / relH);
            view.x = (mRect.width / 2) - (relX + relW / 2) * view.scale;
            view.y = (mRect.height / 2) - (relY + relH / 2) * view.scale;
            crop.w = relW * view.scale; crop.h = relH * view.scale;
            crop.x = (mRect.width - crop.w) / 2; crop.y = (mRect.height - crop.h) / 2;
            update(true);
        }

        function update(smooth) {
            if (!img.isLoaded) return;
            mainImg.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
            cropBox.style.left = crop.x + 'px'; cropBox.style.top = crop.y + 'px';
            cropBox.style.width = crop.w + 'px'; cropBox.style.height = crop.h + 'px';

            // 短辺ハンドルの優先度（z-index）変更
            const h = { n: document.querySelector('.h-n'), s: document.querySelector('.h-s'), e: document.querySelector('.h-e'), w: document.querySelector('.h-w') };
            if (crop.w < crop.h) { h.e.style.zIndex = h.w.style.zIndex = "25"; h.n.style.zIndex = h.s.style.zIndex = "20"; }
            else { h.n.style.zIndex = h.s.style.zIndex = "25"; h.e.style.zIndex = h.w.style.zIndex = "20"; }

            // ナビ枠の計算（中心基準で誤差排除）
            const nRect = nCont.getBoundingClientRect();
            const nScale = Math.min(nRect.width / img.w, nRect.height / img.h);
            const nX = (nRect.width - img.w * nScale) / 2, nY = (nRect.height - img.h * nScale) / 2;
            navImg.style.transform = `translate(${nX}px, ${nY}px) scale(${nScale})`;

            const imgCX = nX + (img.w * nScale) / 2, imgCY = nY + (img.h * nScale) / 2;
            const relCX = (crop.x + crop.w/2 - view.x) / view.scale - img.w/2;
            const relCY = (crop.y + crop.h/2 - view.y) / view.scale - img.h/2;
            const fW = (crop.w / view.scale * nScale), fH = (crop.h / view.scale * nScale);

            navBox.style.width = fW + 'px'; navBox.style.height = fH + 'px';
            navBox.style.left = (imgCX + relCX * nScale - fW/2) + 'px';
            navBox.style.top = (imgCY + relCY * nScale - fH/2) + 'px';
        }
    </script>
</body>
</html>
