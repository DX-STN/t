<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PWA Test App</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* キャンバス構造 */
        .canvas { width: 90vw; margin: 10px 0; background: #222; position: relative; overflow: hidden; touch-action: none; }
        #nav-container { height: 30vh; }
        #main-container { height: 50vh; background: #333; }
        
        /* 画像：JSで完全に制御するため初期値は左上 */
        #main-img, #nav-img { position: absolute; top: 0; left: 0; transform-origin: 0 0; pointer-events: none; }
        
        /* 枠：キャンバスに対して絶対配置 */
        .crop-box { position: absolute; border: 2px solid blue; box-sizing: border-box; z-index: 10; pointer-events: none; }
        .nav-box { position: absolute; border: 1px solid red; background: rgba(255, 0, 0, 0.2); z-index: 10; pointer-events: none; }

        .footer { margin-top: 10px; }
        .file-btn { display: inline-block; width: 60px; height: 60px; background: white; border-radius: 50%; font-size: 30px; line-height: 60px; cursor: pointer; text-align: center; color: black; }
    </style>
</head>
<body>

    <div id="nav-container" class="canvas">
        <img id="nav-img">
        <div id="nav-box" class="nav-box"></div>
    </div>

    <div id="main-container" class="canvas">
        <img id="main-img">
        <div id="crop-box" class="crop-box"></div>
    </div>

    <div class="footer">
        <input type="file" id="file-input" accept="image/*" hidden>
        <label for="file-input" class="file-btn">📁</label>
    </div>

    <script>
        const navImg = document.getElementById('nav-img'), 
              mainImg = document.getElementById('main-img'), 
              navBox = document.getElementById('nav-box'), 
              cropBox = document.getElementById('crop-box');
        const mCont = document.getElementById('main-container'), 
              nCont = document.getElementById('nav-container');

        let img = { w: 0, h: 0 };
        let view = { x: 0, y: 0, scale: 1 }; 
        let crop = { x: 0, y: 0, w: 200, h: 200 }; // 作業枠の固定サイズ
        let touch = { isDrag: false, lastX: 0, lastY: 0, lastDist: 0, lastScale: 1 };

        // ファイル読み込み
        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                navImg.src = mainImg.src = ev.target.result;
                mainImg.onload = () => {
                    img.w = mainImg.naturalWidth; 
                    img.h = mainImg.naturalHeight;
                    
                    const mRect = mCont.getBoundingClientRect();
                    // 初期：画像が収まるように表示
                    view.scale = Math.min(mRect.width / img.w, mRect.height / img.h);
                    view.x = (mRect.width - img.w * view.scale) / 2;
                    view.y = (mRect.height - img.h * view.scale) / 2;
                    
                    // 作業枠をキャンバス中央に配置
                    crop.x = (mRect.width - crop.w) / 2;
                    crop.y = (mRect.height - crop.h) / 2;

                    update();
                };
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // タッチイベント
        mCont.ontouchstart = (e) => {
            if (e.touches.length === 1) {
                touch.isDrag = true;
                touch.lastX = e.touches[0].pageX;
                touch.lastY = e.touches[0].pageY;
            } else if (e.touches.length === 2) {
                touch.isDrag = false;
                touch.lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                touch.lastScale = view.scale;
            }
        };

        mCont.ontouchmove = (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && touch.isDrag) {
                // スクロール
                view.x += (e.touches[0].pageX - touch.lastX);
                view.y += (e.touches[0].pageY - touch.lastY);
                touch.lastX = e.touches[0].pageX;
                touch.lastY = e.touches[0].pageY;
            } else if (e.touches.length === 2) {
                // ピンチズーム
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const zoom = dist / touch.lastDist;
                const newScale = touch.lastScale * zoom;

                const mRect = mCont.getBoundingClientRect();
                const centerX = mRect.width / 2;
                const centerY = mRect.height / 2;

                // 中心点を維持したズーム
                view.x = centerX - (centerX - view.x) * (newScale / view.scale);
                view.y = centerY - (centerY - view.y) * (newScale / view.scale);
                view.scale = newScale;
            }
            update();
        };

        mCont.ontouchend = () => { touch.isDrag = false; };

        function update() {
            // メイン画像の変形
            mainImg.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
            
            // 作業枠の位置固定
            cropBox.style.left = crop.x + 'px';
            cropBox.style.top = crop.y + 'px';
            cropBox.style.width = crop.w + 'px';
            cropBox.style.height = crop.h + 'px';

            // ナビエリアの計算
            const nRect = nCont.getBoundingClientRect();
            const nScale = Math.min(nRect.width / img.w, nRect.height / img.h);
            const nX = (nRect.width - img.w * nScale) / 2;
            const nY = (nRect.height - img.h * nScale) / 2;
            
            navImg.style.transform = `translate(${nX}px, ${nY}px) scale(${nScale})`;

            // ナビ赤枠：メインの青枠が「画像内のどの位置か」を逆算して描画
            const relX = (crop.x - view.x) / view.scale;
            const relY = (crop.y - view.y) / view.scale;
            const relW = crop.w / view.scale;
            const relH = crop.h / view.scale;

            navBox.style.left = (nX + relX * nScale) + 'px';
            navBox.style.top = (nY + relY * nScale) + 'px';
            navBox.style.width = (relW * nScale) + 'px';
            navBox.style.height = (relH * nScale) + 'px';
        }
    </script>
</body>
</html>
