<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PWA Test App - Fit Fix</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .canvas { width: 90vw; margin: 10px 0; background: #222; position: relative; overflow: hidden; touch-action: none; }
        #nav-container { height: 30vh; }
        #main-container { height: 50vh; background: #333; }
        #main-img, #nav-img { position: absolute; top: 0; left: 0; transform-origin: 0 0; pointer-events: none; display: none; }
        .crop-box { position: absolute; border: 2px solid blue; box-sizing: border-box; z-index: 10; display: none; }
        .nav-box { position: absolute; border: 1px solid red; background: rgba(255, 0, 0, 0.2); z-index: 10; pointer-events: none; display: none; }
        .handle { position: absolute; background: rgba(0, 100, 255, 0.3); }
        .h-n { top: -20px; left: 0; right: 0; height: 40px; }
        .h-s { bottom: -20px; left: 0; right: 0; height: 40px; }
        .h-e { right: -20px; top: 0; bottom: 0; width: 40px; }
        .h-w { left: -20px; top: 0; bottom: 0; width: 40px; }
        .footer { margin-top: 10px; }
        .file-btn { display: inline-block; width: 60px; height: 60px; background: white; border-radius: 50%; font-size: 30px; line-height: 60px; cursor: pointer; text-align: center; color: black; }
    </style>
</head>
<body>
    <div id="nav-container" class="canvas"><img id="nav-img"><div id="nav-box" class="nav-box"></div></div>
    <div id="main-container" class="canvas">
        <img id="main-img">
        <div id="crop-box" class="crop-box">
            <div class="handle h-n" data-edge="n"></div><div class="handle h-s" data-edge="s"></div>
            <div class="handle h-e" data-edge="e"></div><div class="handle h-w" data-edge="w"></div>
        </div>
    </div>
    <div class="footer"><input type="file" id="file-input" accept="image/*" hidden><label for="file-input" class="file-btn">📁</label></div>

    <script>
        const navImg = document.getElementById('nav-img'), mainImg = document.getElementById('main-img'), navBox = document.getElementById('nav-box'), cropBox = document.getElementById('crop-box');
        const mCont = document.getElementById('main-container'), nCont = document.getElementById('nav-container');

        let img = { w: 0, h: 0, isLoaded: false };
        let view = { x: 0, y: 0, scale: 1 }; 
        let crop = { x: 0, y: 0, w: 0, h: 0 }; 
        let touch = { mode: '', lastX: 0, lastY: 0, edge: '' };

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                navImg.src = mainImg.src = ev.target.result;
                mainImg.onload = () => {
                    img.w = mainImg.naturalWidth; img.h = mainImg.naturalHeight;
                    img.isLoaded = true;
                    const mRect = mCont.getBoundingClientRect();
                    view.scale = Math.min(mRect.width / img.w, mRect.height / img.h);
                    view.x = (mRect.width - img.w * view.scale) / 2;
                    view.y = (mRect.height - img.h * view.scale) / 2;
                    crop = { x: view.x, y: view.y, w: img.w * view.scale, h: img.h * view.scale };
                    mainImg.style.display = navImg.style.display = 'block';
                    cropBox.style.display = navBox.style.display = 'block';
                    update();
                };
            };
            reader.readAsDataURL(file);
        };

        mCont.ontouchstart = (e) => {
            if (!img.isLoaded) return;
            const t = e.touches[0];
            if (e.target.classList.contains('handle')) {
                touch.mode = 'edit';
                touch.edge = e.target.dataset.edge;
            } else {
                touch.mode = 'scroll';
            }
            touch.lastX = t.pageX; touch.lastY = t.pageY;
        };

        mCont.ontouchmove = (e) => {
            if (!img.isLoaded || !touch.mode) return;
            e.preventDefault();
            const t = e.touches[0];
            const dx = t.pageX - touch.lastX;
            const dy = t.pageY - touch.lastY;

            if (touch.mode === 'scroll') {
                view.x += dx; view.y += dy;
            } else if (touch.mode === 'edit') {
                // 画像の範囲内で枠を動かす（簡易制限）
                if (touch.edge === 'n') { crop.y += dy; crop.h -= dy; }
                if (touch.edge === 's') { crop.h += dy; }
                if (touch.edge === 'e') { crop.w += dx; }
                if (touch.edge === 'w') { crop.x += dx; crop.w -= dx; }
            }
            touch.lastX = t.pageX; touch.lastY = t.pageY;
            update();
        };

        mCont.ontouchend = () => {
            if (touch.mode === 'edit') fitToCrop();
            touch.mode = '';
        };

        function fitToCrop() {
            const mRect = mCont.getBoundingClientRect();
            
            // 1. 枠の中身の「画像内の相対座標」を特定
            const relX = (crop.x - view.x) / view.scale;
            const relY = (crop.y - view.y) / view.scale;
            const relW = crop.w / view.scale;
            const relH = crop.h / view.scale;

            // 2. 新しい倍率（枠の中身がキャンバスいっぱいに広がる倍率）
            view.scale = Math.min(mRect.width / relW, mRect.height / relH);

            // 3. 移動量の設定（枠の中央をキャンバス中央へ）
            view.x = (mRect.width / 2) - (relX + relW / 2) * view.scale;
            view.y = (mRect.height / 2) - (relY + relH / 2) * view.scale;

            // 4. 枠をキャンバス中央の最大サイズにリセット（次の選択のため）
            crop.w = relW * view.scale;
            crop.h = relH * view.scale;
            crop.x = (mRect.width - crop.w) / 2;
            crop.y = (mRect.height - crop.h) / 2;

            update();
        }

        function update() {
            if (!img.isLoaded) return;
            mainImg.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
            cropBox.style.left = crop.x + 'px'; cropBox.style.top = crop.y + 'px';
            cropBox.style.width = crop.w + 'px'; cropBox.style.height = crop.h + 'px';

            const nRect = nCont.getBoundingClientRect();
            const nScale = Math.min(nRect.width / img.w, nRect.height / img.h);
            const nX = (nRect.width - img.w * nScale) / 2, nY = (nRect.height - img.h * nScale) / 2;
            navImg.style.transform = `translate(${nX}px, ${nY}px) scale(${nScale})`;

            const rx = (crop.x - view.x) / view.scale, ry = (crop.y - view.y) / view.scale;
            const rw = crop.w / view.scale, rh = crop.h / view.scale;
            navBox.style.left = (nX + rx * nScale) + 'px'; navBox.style.top = (nY + ry * nScale) + 'px';
            navBox.style.width = (rw * nScale) + 'px'; navBox.style.height = (rh * nScale) + 'px';
        }
    </script>
</body>
</html>
